    repeated Thumbnail thumbnails = 2;
    int64 read_action = 3; // C signature: void handle_stream_operation(intptr_t bindings_handle, ByteArray buffer, intptr_t sdk_handle);
    int64 progress_action = 4; // See array_action in C header file for signature
    int64 cancellation_token_source_handle = 5;
    int64 sha1_function = 7; // Optional - C signature: void write_expected_sha1(intptr_t bindings_handle, ByteArray output_buffer); writes SHA-1 digest bytes into output_buffer (20 bytes).
}

// The response value must be an Int64Value carrying a handle to an instance of UploadController.
message DrivePhotosClientUploadFromFileRequest {
    int64 uploader_handle = 1;
    repeated Thumbnail thumbnails = 2;
    string file_path = 3;
    int64 progress_action = 4; // See array_action in C header file for signature
    int64 cancellation_token_source_handle = 5;
    int64 sha1_function = 7; // Optional - C signature: void write_expected_sha1(intptr_t bindings_handle, ByteArray output_buffer); writes SHA-1 digest bytes into output_buffer (20 bytes).
}

// The response must not have a value.
message DrivePhotosClientUploaderFreeRequest {
    int64 file_uploader_handle = 1;
}

// The response message must be of type NodeResultListResponse
message DrivePhotosClientTrashNodesRequest {
    int64 client_handle = 1;
    repeated string node_uids = 2;
    int64 cancellation_token_source_handle = 3;
}

// The response message must be of type NodeResultListResponse
message DrivePhotosClientDeleteNodesRequest {
    int64 client_handle = 1;
    repeated string node_uids = 2;
    int64 cancellation_token_source_handle = 3;
}

// The response message must be of type NodeResultListResponse
message DrivePhotosClientRestoreNodesRequest {
    int64 client_handle = 1;
    repeated string node_uids = 2;
    int64 cancellation_token_source_handle = 3;
}

// The response must not have a value, yield_action will be called for each item.
message DrivePhotosClientEnumerateTrashRequest {
    int64 client_handle = 1;
    int64 yield_action = 3;
    int64 cancellation_token_source_handle = 2;
}

// The response must not have a value.
message DrivePhotosClientEmptyTrashRequest {
    int64 client_handle = 1;
    int64 cancellation_token_source_handle = 2;
}

// The list must match the order from Telemetry/VolumeTypes to properly match it over the interop.
enum VolumeType {
    VOLUME_TYPE_UNKNOWN = 0;
    VOLUME_TYPE_OWN_VOLUME = 1;
    VOLUME_TYPE_OWN_PHOTO_VOLUME = 2;
    VOLUME_TYPE_SHARED = 3;
    VOLUME_TYPE_SHARED_PUBLIC = 4;
}

enum DownloadError {
    DOWNLOAD_ERROR_SERVER_ERROR = 0;
    DOWNLOAD_ERROR_NETWORK_ERROR = 1;
    DOWNLOAD_ERROR_DECRYPTION_ERROR = 2;
    DOWNLOAD_ERROR_INTEGRITY_ERROR = 3;
    DOWNLOAD_ERROR_RATE_LIMITED = 4;
    DOWNLOAD_ERROR_HTTP_CLIENT_SIDE_ERROR = 5;
    DOWNLOAD_ERROR_UNKNOWN = 6;
    DOWNLOAD_ERROR_VALIDATION_ERROR = 7;
}

enum UploadError {
    UPLOAD_ERROR_SERVER_ERROR = 0;
    UPLOAD_ERROR_NETWORK_ERROR = 1;
    UPLOAD_ERROR_INTEGRITY_ERROR = 2;
    UPLOAD_ERROR_RATE_LIMITED = 3;
    UPLOAD_ERROR_HTTP_CLIENT_SIDE_ERROR = 4;
    UPLOAD_ERROR_UNKNOWN = 5;
    UPLOAD_ERROR_VALIDATION_ERROR = 6;
}

enum EncryptedField {
    ENCRYPTED_FIELD_SHARE_KEY = 0;
    ENCRYPTED_FIELD_NODE_KEY = 1;
    ENCRYPTED_FIELD_NODE_NAME = 2;
    ENCRYPTED_FIELD_NODE_HASH_KEY = 3;
    ENCRYPTED_FIELD_NODE_EXTENDED_ATTRIBUTES = 4;
    ENCRYPTED_FIELD_NODE_CONTENT_KEY = 5;
    ENCRYPTED_FIELD_CONTENT = 6;
}

message UploadEventPayload {
    VolumeType volume_type = 1;
    int64 expected_size = 2;
    int64 approximate_expected_size = 3; // To be used when exact size must not be communicated in order to prevent fingerprinting
    int64 uploaded_size = 4;
    int64 approximate_uploaded_size = 5; // To be used when exact size must not be communicated in order to prevent fingerprinting
    UploadError error = 6; // Optional
    string original_error = 7; // Optional
}

message DownloadEventPayload {
    VolumeType volume_type = 1;
    int64 claimed_file_size = 2;
    int64 approximate_claimed_file_size = 3; // To be used when exact size must not be communicated in order to prevent fingerprinting
    int64 downloaded_size = 4;
    int64 approximate_downloaded_size = 5; // To be used when exact size must not be communicated in order to prevent fingerprinting
    DownloadError error = 6; // Optional
    string original_error = 7; // Optional
}

message DecryptionErrorEventPayload {
    VolumeType volume_type = 1;
    EncryptedField field = 2;
    bool from_before_2024 = 3;
    string error = 4; // Optional
    string uid = 5;
}

message VerificationErrorEventPayload {
    VolumeType volume_type = 1;
    EncryptedField field = 2;
    bool from_before_2024 = 3;
    bool address_matching_default_share = 4;
    string error = 5; // Optional
    string uid = 6;
}

message BlockVerificationErrorEventPayload {
    VolumeType volume_type = 1;
    bool retry_helped = 2;
}

message NodeNameConflictErrorData {
    bool conflicting_node_is_file_draft = 1;
    string conflicting_node_uid = 2;
    string conflicting_revision_uid = 3;
}

message MissingContentBlockErrorData {
    int32 block_number = 1;
}

message ContentSizeMismatchErrorData {
    int64 uploaded_size = 1;
    int64 expected_size = 2;
}

message ThumbnailCountMismatchErrorData {
    int32 uploaded_block_count = 1;
    int32 expected_block_count = 2;
}

message ChecksumMismatchErrorData {
    bytes actual_checksum = 1;
    bytes expected_checksum = 2;
}

message NodeNotFoundErrorData {
    string node_uid = 1;
}
