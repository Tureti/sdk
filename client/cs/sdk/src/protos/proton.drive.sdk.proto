// Photo uploader

// The response value must be an Int64Value carrying a handle to an instance of PhotosFileUploader.
message DrivePhotosClientGetPhotoUploaderRequest {
    int64 client_handle = 1;
    string name = 2;
    string media_type = 3;
    int64 size = 4;
    PhotosFileUploadMetadata metadata = 5;
    bool override_existing_draft_by_other_client = 6;
    // When unset or false, waits for a slot in the queue.
    // When true, only reserves a slot if immediately available.
    bool no_waiting = 7;
    int64 cancellation_token_source_handle = 8;
}

message PhotosFileUploadMetadata {
    google.protobuf.Timestamp last_modification_time = 1; // Optional
    repeated AdditionalMetadataProperty additional_metadata = 2; // Optional
    google.protobuf.Timestamp capture_time = 3; // Optional
    string main_photo_uid = 4; // Optional
    repeated PhotoTag tags = 5; // Optional
}

enum PhotoTag {
    PHOTO_TAG_FAVORITE = 0;
    PHOTO_TAG_SCREENSHOT = 1;
    PHOTO_TAG_VIDEO = 2;
    PHOTO_TAG_LIVE_PHOTO = 3;
    PHOTO_TAG_MOTION_PHOTO = 4;
    PHOTO_TAG_SELFIE = 5;
    PHOTO_TAG_PORTRAIT = 6;
    PHOTO_TAG_BURST = 7;
    PHOTO_TAG_PANORAMA = 8;
    PHOTO_TAG_RAW = 9;
}

// The response message must be of type google.protobuf.ListValue containing node UIDs of duplicate photos.
message DrivePhotosClientFindDuplicatesRequest {
    int64 client_handle = 1;
    string name = 2;
    int64 generate_sha1_function = 3; // C signature: ByteArray generate_sha1(intptr_t bindings_handle);
