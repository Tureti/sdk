    // When unset or false, waits for a slot in the queue (uses cancellation_token_source_handle).
    // When true, only reserves a slot if immediately available (cancellation_token_source_handle is ignored).
    bool no_waiting = 3;
    int64 cancellation_token_source_handle = 4;
