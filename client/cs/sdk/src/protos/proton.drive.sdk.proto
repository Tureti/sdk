edition = "2023";
package proton.drive.sdk;

option features.utf8_validation = NONE;
option csharp_namespace = "Proton.Drive.Sdk.CExports";

import "proton.sdk.proto";
import "google/protobuf/timestamp.proto";

message Request {
    oneof payload {
        DriveClientCreateRequest drive_client_create = 1000;
        DriveClientCreateFromSessionRequest drive_client_create_from_session = 1001;
        DriveClientFreeRequest drive_client_free = 1002;
        DriveClientGetFileUploaderRequest drive_client_get_file_uploader = 1003;
        DriveClientGetFileRevisionUploaderRequest drive_client_get_file_revision_uploader = 1004;
        DriveClientGetFileDownloaderRequest drive_client_get_file_downloader = 1005;
        DriveClientGetAvailableNameRequest drive_client_get_available_name = 1006;
        DriveClientRenameRequest drive_client_rename = 1007;
        DriveClientCreateFolderRequest drive_client_create_folder = 1008;
        DriveClientTrashNodesRequest drive_client_trash_nodes = 1009;
        DriveClientEnumerateFolderChildrenRequest drive_client_enumerate_folder_children = 1010;
        DriveClientGetMyFilesFolderRequest drive_client_get_my_files_folder = 1011;
        DriveClientDeleteNodesRequest drive_client_delete_nodes = 1012;
        DriveClientRestoreNodesRequest drive_client_restore_nodes = 1013;
        DriveClientEnumerateTrashRequest drive_client_enumerate_trash = 1014;
        DriveClientEmptyTrashRequest drive_client_empty_trash = 1015;
        DriveClientEnumerateThumbnailsRequest drive_client_enumerate_thumbnails = 1016;
        DriveClientGetNodeRequest drive_client_get_node = 1017;

        UploadFromStreamRequest upload_from_stream = 1100;
        UploadFromFileRequest upload_from_file = 1101;
        FileUploaderFreeRequest file_uploader_free = 1102;
        UploadControllerIsPausedRequest upload_controller_is_paused = 1103;
        UploadControllerAwaitCompletionRequest upload_controller_await_completion = 1104;
        UploadControllerPauseRequest upload_controller_pause = 1105;
        UploadControllerResumeRequest upload_controller_resume = 1106;
        UploadControllerDisposeRequest upload_controller_dispose = 1107;
        UploadControllerFreeRequest upload_controller_free = 1108;

        DownloadToStreamRequest download_to_stream = 1200;
        DownloadToFileRequest download_to_file = 1201;
        FileDownloaderFreeRequest file_downloader_free = 1202;
        DownloadControllerIsPausedRequest download_controller_is_paused = 1203;
        DownloadControllerIsDownloadCompleteWithVerificationIssueRequest download_controller_is_download_complete_with_verification_issue = 1204;
        DownloadControllerAwaitCompletionRequest download_controller_await_completion = 1205;
        DownloadControllerPauseRequest download_controller_pause = 1206;
        DownloadControllerResumeRequest download_controller_resume = 1207;
        DownloadControllerFreeRequest download_controller_free = 1208;

        DrivePhotosClientCreateRequest drive_photos_client_create = 1300;
        DrivePhotosClientCreateFromSessionRequest drive_photos_client_create_from_session = 1301;
        DrivePhotosClientFreeRequest drive_photos_client_free = 1302;
        DrivePhotosClientGetPhotoDownloaderRequest drive_photos_client_get_photo_downloader = 1303;
        DrivePhotosClientDownloadToStreamRequest drive_photos_client_download_to_stream = 1304;
        DrivePhotosClientDownloadToFileRequest drive_photos_client_download_to_file = 1305;
        DrivePhotosClientDownloaderFreeRequest drive_photos_client_downloader_free = 1306;
        DrivePhotosClientGetNodeRequest drive_photos_client_get_node = 1307;
        DrivePhotosClientEnumerateTimelineRequest drive_photos_client_enumerate_timeline = 1308;
        DrivePhotosClientGetPhotoUploaderRequest drive_photos_client_get_photo_uploader = 1309;
        DrivePhotosClientFindDuplicatesRequest drive_photos_client_find_duplicates = 1310;
        DrivePhotosClientUploadFromStreamRequest drive_photos_client_upload_from_stream = 1311;
        DrivePhotosClientUploadFromFileRequest drive_photos_client_upload_from_file = 1312;
        DrivePhotosClientUploaderFreeRequest drive_photos_client_uploader_free = 1313;
        DrivePhotosClientEnumerateThumbnailsRequest drive_photos_client_enumerate_thumbnails = 1314;
        DrivePhotosClientTrashNodesRequest drive_photos_client_trash_nodes = 1315;
        DrivePhotosClientDeleteNodesRequest drive_photos_client_delete_nodes = 1316;
        DrivePhotosClientRestoreNodesRequest drive_photos_client_restore_nodes = 1317;
        DrivePhotosClientEnumerateTrashRequest drive_photos_client_enumerate_trash = 1318;
        DrivePhotosClientEmptyTrashRequest drive_photos_client_empty_trash = 1319;
    };
}

// Account client interface

message AccountRequest {
    oneof payload {
        GetAddressRequest get_address = 1;
        GetDefaultAddressRequest get_default_address = 2;
        GetAddressPrimaryPrivateKeyRequest get_address_primary_private_key = 3;
        GetAddressPrivateKeysRequest get_address_private_keys = 4;
        GetAddressPublicKeysRequest get_address_public_keys = 5;
    };
}

// The response value must be an Address.
message GetAddressRequest {
    string address_id = 1;
}

// The response value must be an Address.
message GetDefaultAddressRequest {
}

// The response value must be a BytesValue.
message GetAddressPrimaryPrivateKeyRequest {
    string address_id = 1;
}

// The response value must be a RepeatedBytesValue.
message GetAddressPrivateKeysRequest {
    string address_id = 1;
}

// The response value must be a RepeatedBytesValue.
message GetAddressPublicKeysRequest {
    string email_address = 1;
}

// Drive - client

enum ThumbnailType {
    THUMBNAIL_TYPE_UNSPECIFIED = 0; // Invalid value
    THUMBNAIL_TYPE_THUMBNAIL = 1;
    THUMBNAIL_TYPE_PREVIEW = 2;
}

message FileRevision {
    string uid = 1;
    google.protobuf.Timestamp creation_time = 2;
    int64 size_on_cloud_storage = 3;
    int64 claimed_size = 4; // optional
    FileContentDigests claimed_digests = 5;
    google.protobuf.Timestamp claimed_modification_time = 6; // optional
    repeated ThumbnailHeader thumbnails = 7;
    repeated AdditionalMetadataProperty additional_claimed_metadata = 8; // optional
    AuthorResult content_author = 9; // optional
}

message FileNode {
    string uid = 1;
    string parent_uid = 2;
    string tree_event_scope_id = 3;
    StringResult name = 4;
    string media_type = 5;
    google.protobuf.Timestamp creation_time = 6;
    google.protobuf.Timestamp trash_time = 7; // optional
    AuthorResult name_author = 8;
    AuthorResult author = 9;
    FileRevision active_revision = 10;
    int64 total_size_on_cloud_storage = 11;
    OwnedBy owned_by = 12;
    repeated DriveError errors = 13;
}

message FolderNode {
    string uid = 1;
    string parent_uid = 2; // optional
    string tree_event_scope_id = 3;
    StringResult name = 4;
    google.protobuf.Timestamp creation_time = 5;
    google.protobuf.Timestamp trash_time = 6; // optional
    AuthorResult name_author = 7;
    AuthorResult author = 8;
    OwnedBy owned_by = 9;
    repeated DriveError errors = 10;
}

message SignatureVerificationError {
    Author claimed_author = 1; // optional - preserves error context
    string message = 2; // optional
}

message AuthorResult {
    oneof result {
        Author value = 1;
        SignatureVerificationError error = 2;
    }
}

message Author {
    string email_address = 1; // optional
}

message OwnedBy {
    string email = 1; // optional - owner email for regular and photo volumes
    string organization = 2; // optional - organization name for org. volumes
}

message ProgressUpdate {
    int64 bytes_completed = 1;
    int64 bytes_in_total = 2; // optional
}

message Thumbnail {
    ThumbnailType type = 1;
    int64 data_pointer = 2;
    int64 data_length = 3;
}

message FileThumbnail {
    string file_uid = 1;
    oneof result {
        bytes data = 2;
        DriveError error = 3;
    }
}

message FileThumbnailList {
    repeated FileThumbnail thumbnails = 1;
}

message UploadResult {
    string node_uid = 1;
    string revision_uid = 2;
}

message HttpClient {
    // Pointer to C function that will be called:
    // intptr_t handle_http_request(intptr_t bindings_handle, ByteArray http_request, intptr_t sdk_handle)
    //   bindings_handle: handle for the bindings
    //   http_request: Protobuf message of type proton.sdk.HttpRequest carrying the HTTP request data
    //   sdk_handle: handle for the SDK
    // Returns a cancellation handle to be passed to the cancellation action. That handle can be freed after the request is completed, but there could be
    // a race condition where the cancellation is still called after the request is completed, so this must be accounted for.
    int64 request_function = 1;
    int64 response_content_read_action = 2; // C signature: void handle_http_response_read(intptr_t bindings_handle, ByteArray buffer, intptr_t sdk_handle);
    int64 cancellation_action = 3; // C signature: void handle_http_cancellation(intptr_t bindings_operation_handle);
}

message ProtonDriveClientOptions {
    // Client UID, optional
    // If a null value is provided, the SDK automatically generates a UUID during initialization
    string uid = 1;

    string bindings_language = 2; // Optional
        
    int32 api_call_timeout = 3; // Optional
    int32 storage_call_timeout = 4; // Optional

    int32 block_transfer_parallelism = 5; // Optional
}

// The response value must be an Int64Value carrying a handle to an instance of ProtonDriveClient.
message DriveClientCreateRequest {
    string base_url = 1;
    HttpClient http_client = 2;
    ProtonDriveClientOptions client_options = 3; // Optional

    // Pointer to C function that will be called:
    // void handle_account_request(intptr_t bindings_handle, ByteArray http_request, intptr_t sdk_handle)
    //   bindings_handle: handle for the bindings
    //   account_request: Protobuf message of type proton.drive.sdk.AccountRequest carrying the request data
    //   sdk_handle: handle for the SDK
    int64 account_request_action = 4;

    string entity_cache_path = 5; // Optional
    string secret_cache_path = 6; // Optional

    proton.sdk.Telemetry telemetry = 7; // Optional
    
    // Pointer to C function that will be called to check feature flags:
    // int is_feature_flag_enabled(intptr_t bindings_handle, ByteArray flag_name)
    //   bindings_handle: handle for the bindings
    //   flag_name: UTF-8 encoded feature flag name
    //   returns: 0 for disabled, non-zero for enabled
    int64 feature_enabled_function = 8; // Optional

    // Encryption key used to encrypt the secrets cache. Must be a 32-byte
    // random key. If a null value is provided, secrets cache won't be encrypted.
    bytes secret_cache_encryption_key = 9; // Optional
}

// The response value must be an Int64Value carrying a handle to an instance of ProtonDriveClient.
message DriveClientCreateFromSessionRequest {
    int64 session_handle = 1;
}

// The response must not have a value.
message DriveClientFreeRequest {
    int64 client_handle = 1;
}

// Drive - uploads

message AdditionalMetadataProperty {
    string name = 1;
    bytes utf8_json_value = 2;
}

// The response value must be an Int64Value carrying a handle to an instance of FileUploader (or 0 if no_waiting is true and no slot was free)..
message DriveClientGetFileUploaderRequest {
    int64 client_handle = 1;
    string parent_folder_uid = 2;
    string name = 3;
    string mediaType = 4;
    int64 size = 5;
    google.protobuf.Timestamp last_modification_time = 6; // Optional
    repeated AdditionalMetadataProperty additional_metadata = 7; // Optional
    bool override_existing_draft_by_other_client = 8;
    // When unset or false, waits for a slot in the queue (uses cancellation_token_source_handle).
    // When true, only reserves a slot if immediately available (cancellation_token_source_handle is ignored).
    bool no_waiting = 9;
    int64 cancellation_token_source_handle = 10;
}

// The response value must be an Int64Value carrying a handle to an instance of FileUploader (or 0 if no_waiting is true and no slot was free).
message DriveClientGetFileRevisionUploaderRequest {
    int64 client_handle = 1;
    string current_active_revision_uid = 2;
    int64 size = 3;
    google.protobuf.Timestamp last_modification_time = 4; // Optional
    repeated AdditionalMetadataProperty additional_metadata = 5; // Optional
    // When unset or false, waits for a slot in the queue (uses cancellation_token_source_handle).
    // When true, only reserves a slot if immediately available (cancellation_token_source_handle is ignored).
    bool no_waiting = 6;
    int64 cancellation_token_source_handle = 7;
}

// The response value must be an Int64Value carrying a handle to an instance of UploadController.
message UploadFromStreamRequest {
    int64 uploader_handle = 1;
    repeated Thumbnail thumbnails = 2;
    int64 read_action = 3; // C signature: void handle_stream_operation(intptr_t bindings_handle, ByteArray buffer, intptr_t sdk_handle);
    int64 progress_action = 4; // See array_action in C header file for signature
    int64 cancellation_token_source_handle = 5;
    int64 cancel_action = 6; // Optional, C signature: void on_cancel(intptr_t bindings_handle); Signals the bindings to cancel the current stream operation.
    int64 sha1_function = 7; // Optional - C signature: void write_expected_sha1(intptr_t bindings_handle, ByteArray output_buffer); writes SHA-1 digest bytes into output_buffer (20 bytes).
}

// The response value must be an Int64Value carrying a handle to an instance of UploadController.
message UploadFromFileRequest {
    int64 uploader_handle = 1;
    repeated Thumbnail thumbnails = 2;
    string file_path = 3;
    int64 progress_action = 4; // See array_action in C header file for signature
    int64 cancellation_token_source_handle = 5;
    int64 sha1_function = 7; // Optional - C signature: void write_expected_sha1(intptr_t bindings_handle, ByteArray output_buffer); writes SHA-1 digest bytes into output_buffer (20 bytes).
}

// The response must not have a value.
message FileUploaderFreeRequest {
    int64 file_uploader_handle = 1;
}

// The response message must be of type BoolValue.
message UploadControllerIsPausedRequest {
    int64 upload_controller_handle = 1;
}

// The response message must be of type UploadResult.
message UploadControllerAwaitCompletionRequest {
    int64 upload_controller_handle = 1;
}

// The response must not have a value.
message UploadControllerPauseRequest {
    int64 upload_controller_handle = 1;
}

// The response must not have a value.
message UploadControllerResumeRequest {
    int64 upload_controller_handle = 1;
}

// The response must not have a value.
message UploadControllerDisposeRequest {
    int64 upload_controller_handle = 1;
}

// The response must not have a value.
message UploadControllerFreeRequest {
    int64 upload_controller_handle = 1;
}

// The response message must be of type String.
message DriveClientGetAvailableNameRequest {
    int64 client_handle = 1;
    string parent_folder_uid = 2;
    string name = 3;
    int64 cancellation_token_source_handle = 4;
}

// The response must not have a value.
message DriveClientRenameRequest {
    int64 client_handle = 1;
    string node_uid = 2;
    string new_name = 3;
    string new_media_type = 4;
    int64 cancellation_token_source_handle = 5;
}

// The response message must be of type FolderNode
message DriveClientCreateFolderRequest {
    int64 client_handle = 1;
    string parent_folder_uid = 2;
    string folder_name = 3;
    google.protobuf.Timestamp last_modification_time = 4; // Optional
    int64 cancellation_token_source_handle = 5;
}

// The response message must be of type NodeResultListResponse
message DriveClientTrashNodesRequest {
    int64 client_handle = 1;
    repeated string node_uids = 2;
    int64 cancellation_token_source_handle = 3;
}

message NodeResultPair {
  string node_uid = 1;
  proton.sdk.Error error = 2;
}

message NodeResultListResponse {
  repeated NodeResultPair results = 1;
}

// The response message must be of type NodeResultListResponse
message DriveClientDeleteNodesRequest {
    int64 client_handle = 1;
    repeated string node_uids = 2;
    int64 cancellation_token_source_handle = 3;
}

// The response message must be of type NodeResultListResponse
message DriveClientRestoreNodesRequest {
    int64 client_handle = 1;
    repeated string node_uids = 2;
    int64 cancellation_token_source_handle = 3;
}

// The response must not have a value, yield_action will be called for each item.
message DriveClientEnumerateTrashRequest {
    int64 client_handle = 1;
    int64 yield_action = 2;
    int64 cancellation_token_source_handle = 3;
}

message TrashedNodeList {
    repeated Node nodes = 1;
}

// The response must not have a value.
message DriveClientEmptyTrashRequest {
    int64 client_handle = 1;
    int64 cancellation_token_source_handle = 2;
}

// The response must not have a value, yield_action will be call for each item.
message DriveClientEnumerateThumbnailsRequest {
    int64 client_handle = 1;
    repeated string file_uids = 2;
    ThumbnailType type = 3;
    int64 yield_action = 4;
    int64 cancellation_token_source_handle = 5;
}

// The response must not have a value, yield_action will be called for each item.
message DriveClientEnumerateFolderChildrenRequest {
    int64 client_handle = 1;
    string folder_uid = 2;
    int64 yield_action = 3;
    int64 cancellation_token_source_handle = 4;
}

// The response message must be of type FolderNode.
message DriveClientGetMyFilesFolderRequest {
    int64 client_handle = 1;
    int64 cancellation_token_source_handle = 2;
}

// The response message must be of type Node (nullable).
message DriveClientGetNodeRequest {
    int64 client_handle = 1;
    string node_uid = 2;
    int64 cancellation_token_source_handle = 3;
}

message Node {
    oneof node {
        FolderNode folder = 1;
        FileNode file = 2;
    }
}

message DriveError {
    string message = 1; // optional
    DriveError inner_error = 2; // optional
}

message StringResult {
    oneof result {
        string value = 1;
        DriveError error = 2;
    }
}

message FileContentDigests {
    bytes sha1 = 1; // optional
    bool sha1_verified = 2;
}

message ThumbnailHeader {
    string id = 1;
    ThumbnailType type = 2;
}

// Drive - downloads

// The response value must be an Int64Value carrying a handle to an instance of FileDownloader (or 0 if no_waiting is true and no slot was free).
message DriveClientGetFileDownloaderRequest {
    int64 client_handle = 1;
    string revision_uid = 2;
    // When unset or false, waits for a slot in the queue (uses cancellation_token_source_handle).
    // When true, only reserves a slot if immediately available (cancellation_token_source_handle is ignored).
